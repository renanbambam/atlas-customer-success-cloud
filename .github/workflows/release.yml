name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    name: Validate and deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate production org
        run: |
          echo "${{ secrets.PROD_AUTH_URL }}" > prod-auth.txt
          sf org login sfdx-url --sfdx-url-file prod-auth.txt --alias prod --set-default
          rm prod-auth.txt

      - name: Check-only validation with local tests
        run: sf project deploy validate --source-dir force-app --test-level RunLocalTests --wait 60

      - name: Deploy
        run: sf project deploy start --source-dir force-app --test-level RunLocalTests --wait 60

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
